services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - path: ./groq.env
        required: true
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
